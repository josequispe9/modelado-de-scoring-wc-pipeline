# Pipeline — Infraestructura central (gaspar: 192.168.9.115)
#
# Servicios:
#   postgres       — BD de Airflow (base: airflow) + BD del proyecto (base: scoring)
#   redis          — broker Celery
#   airflow-*      — scheduler, webserver, triggerer, worker
#
# Executor: CeleryExecutor — el scheduler encola tareas en Redis; el worker las ejecuta.
# Las tareas usan SSHOperator para correr scripts nativamente en las 3 PCs Windows.
#
# Levantar por primera vez:
#   1. Completar AIRFLOW__CORE__FERNET_KEY en .env.tuberia (raiz del proyecto)
#      python3 -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
#   2. mkdir -p dags logs plugins
#   3. docker compose up airflow-init      (migra BD y crea usuario admin)
#   4. docker compose up -d                (levanta todo)
#
# Airflow UI:  http://192.168.9.115:8080
# Postgres:    localhost:5432              airflow / airflow  |  scoring / scoring

x-airflow-common: &airflow-common
  image: apache/airflow:2.10.3
  env_file: ../../../.env.tuberia
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CELERY__BROKER_URL: redis://redis:6379/0
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth

    # Conexiones SSH a las 3 PCs (usadas por SSHOperator en los DAGs)
    AIRFLOW_CONN_SSH_GASPAR: "ssh://airflow-ssh:1234@192.168.9.115:22"
    AIRFLOW_CONN_SSH_MELCHOR: "ssh://juan-t3:1234@192.168.9.195:22"
    AIRFLOW_CONN_SSH_PC_FRANCO: "ssh://bases:ruleta@192.168.9.62:22"

    # URL de la BD del proyecto
    SCORING_DB_URL: postgresql+psycopg2://scoring:scoring@postgres/scoring

  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - ~/.ssh:/home/airflow/.ssh:ro

  extra_hosts:
    - "host.docker.internal:host-gateway"

  depends_on: &airflow-depends-on
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

# ─────────────────────────────────────────────────────────────────────────────
services:

  # ── Base de datos ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis (broker Celery) ──────────────────────────────────────────────────
  redis:
    image: redis:7.2-bookworm
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Inicialización de Airflow (corre una sola vez) ─────────────────────────
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command: -c "exec /entrypoint airflow version"
    environment:
      <<: *airflow-env
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
    restart: "no"

  # ── Componentes de Airflow ─────────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "airflow", "jobs", "check", "--job-type", "SchedulerJob", "--hostname", "$${HOSTNAME}"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  airflow-triggerer:
    <<: *airflow-common
    command: triggerer
    restart: unless-stopped

  airflow-worker:
    <<: *airflow-common
    command: celery worker
    healthcheck:
      test:
        - "CMD-SHELL"
        - 'celery --app airflow.executors.celery_executor.app inspect ping -d "celery@$${HOSTNAME}"'
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

# ─────────────────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
